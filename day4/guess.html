<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Number Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #141e30, #243b55, #0f2027, #203a43);
            background-size: 400% 400%;
            animation: bg 12s ease infinite;
            overflow: hidden;
            position: relative;
        }

        @keyframes bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body::before {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: #00ff87;
            border-radius: 50%;
            filter: blur(150px);
            top: -120px;
            left: -100px;
            opacity: .4;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: #60efff;
            border-radius: 50%;
            filter: blur(150px);
            right: -100px;
            bottom: -120px;
            opacity: .4;
            z-index: 0;
        }

        .game-container {
            position: relative;
            z-index: 1;
            width: 400px;
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, .2);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, .5);
            text-align: center;
            color: white;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 14px;
            color: #ddd;
            margin-bottom: 25px;
        }

        .display-section {
            background: rgba(255, 255, 255, .06);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 15px rgba(255, 255, 255, .05);
        }

        .feedback {
            font-size: 18px;
            font-weight: 500;
            height: 28px;
            color: #00ff87;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            font-size: 14px;
            color: #bbb;
        }

        .stats span strong {
            color: white;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input[type="number"] {
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .2);
            border-radius: 18px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            color: white;
            outline: none;
            transition: 0.3s;
            margin-bottom: 15px;
        }

        input[type="number"]:focus {
            background: rgba(255, 255, 255, .15);
            border-color: #00ff87;
            box-shadow: 0 0 15px rgba(0, 255, 135, 0.2);
        }

        /* Hide spinner controls on numeric input */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        button {
            width: 100%;
            height: 55px;
            border: none;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: .25s;
            color: white;
            background: #0099ff;
            backdrop-filter: blur(10px);
        }

        button:hover {
            transform: translateY(-3px);
            background: #00b7ff;
            box-shadow: 0 10px 25px rgba(0, 183, 255, 0.3);
        }

        button:active {
            transform: scale(.97);
        }

        button.reset-btn {
            background: rgba(255, 255, 255, .1);
            border: 1px solid rgba(255, 255, 255, .2);
            margin-top: 10px;
            display: none;
        }

        button.reset-btn:hover {
            background: rgba(255, 255, 255, .2);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.1);
        }

        @media(max-width: 450px) {
            .game-container { width: 95%; padding: 20px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>GUESS PRO</h1>
    <div class="subtitle">Pick a number between 1 and 100</div>

    <div class="display-section">
        <div class="feedback" id="feedback">Start guessing...</div>
        <div class="stats">
            <span>Attempts Left: <strong id="attempts">10</strong></span>
            <span>High Score: <strong id="highscore">0</strong></span>
        </div>
    </div>

    <div class="input-group">
        <input type="number" id="guessInput" min="1" max="100" placeholder="??" autofocus>
        <button id="submitBtn">Check Guess</button>
        <button id="resetBtn" class="reset-btn">Play Again</button>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // Game state variables
    let secretNumber;
    let attemptsLeft;
    let maxAttempts = 10;
    let highScore = 0;
    let gameOver = false;

    // DOM Elements
    const guessInput = document.getElementById('guessInput');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const feedback = document.getElementById('feedback');
    const attemptsDisplay = document.getElementById('attempts');
    const highScoreDisplay = document.getElementById('highscore');

    // Initialize Game
    function initGame() {
        secretNumber = Math.floor(Math.random() * 100) + 1;
        attemptsLeft = maxAttempts;
        gameOver = false;
        
        feedback.textContent = "Start guessing...";
        feedback.style.color = "#00ff87";
        attemptsDisplay.textContent = attemptsLeft;
        guessInput.value = '';
        guessInput.disabled = false;
        
        submitBtn.style.display = "block";
        resetBtn.style.display = "none";
        guessInput.focus();
    }

    // Handle Logic Verification
    function checkGuess() {
        if (gameOver) return;

        const userGuess = parseInt(guessInput.value);

        // Validation Checklist
        if (isNaN(userGuess) || userGuess < 1 || userGuess > 100) {
            feedback.textContent = "⚠️ Enter a number (1-100)";
            feedback.style.color = "#ff1744";
            return;
        }

        attemptsLeft--;
        attemptsDisplay.textContent = attemptsLeft;

        if (userGuess === secretNumber) {
            // Win condition
            feedback.textContent = "🎉 Correct! You won!";
            feedback.style.color = "#00ff87";
            gameOver = true;
            
            // Calculate Score logic based on remaining attempts
            const score = attemptsLeft + 1;
            if (score > highScore) {
                highScore = score;
                highScoreDisplay.textContent = highScore;
            }
            endGame();
        } else if (attemptsLeft <= 0) {
            // Loss condition
            feedback.textContent = `💥 Game Over! It was ${secretNumber}`;
            feedback.style.color = "#ff1744";
            gameOver = true;
            endGame();
        } else {
            // Hot or cold feedback guidance
            if (userGuess > secretNumber) {
                feedback.textContent = "📉 Too high! Try lower.";
                feedback.style.color = "#60efff";
            } else {
                feedback.textContent = "📈 Too low! Try higher.";
                feedback.style.color = "#ffaa00";
            }
        }

        guessInput.value = '';
        guessInput.focus();
    }

    function endGame() {
        guessInput.disabled = true;
        submitBtn.style.display = "none";
        resetBtn.style.display = "block";
    }

    // Event Listeners
    submitBtn.addEventListener('click', checkGuess);
    resetBtn.addEventListener('click', initGame);
    
    // Fire action on Enter keypress
    guessInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            checkGuess();
        }
    });

    // Fire up the engine initially
    initGame();
});
</script>
</body>
</html>
