<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.input-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 15px;
    background:#007BFF;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#0056b3;
}

ul{
    list-style:none;
    margin-top:20px;
}

li{
    background:#f8f8f8;
    margin:10px 0;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-radius:5px;
}

.delete{
    background:red;
    color:white;
    border:none;
    padding:5px 10px;
    border-radius:5px;
    cursor:pointer;
}

.delete:hover{
    background:darkred;
}
</style>

</head>
<body>

<div class="container">

<h2>To-Do Application</h2>

<div class="input-box">
<input type="text" id="taskInput" placeholder="Enter Task">
<button id="addBtn">Add Task</button>
</div>

<ul id="taskList"></ul>

</div>

<script>

const taskInput=document.getElementById("taskInput");
const addBtn=document.getElementById("addBtn");
const taskList=document.getElementById("taskList");

addBtn.onclick=function(){

let task=taskInput.value.trim();

if(task===""){
    alert("Please Enter a Task");
    return;
}

let li=document.createElement("li");

li.innerHTML=`
<span>${task}</span>
<button class="delete">Delete</button>
`;

taskList.appendChild(li);

taskInput.value="";

li.querySelector(".delete").onclick=function(){
    li.remove();
};

};

taskInput.addEventListener("keypress",function(e){
    if(e.key==="Enter"){
        addBtn.click();
    }
});

</script>

</body>
</html>
